  <body>

          <a href="../index.html">Home</a>

        </p>

    <!-- Contact Form -->
    <form method="post">
      <fieldset>
        <legend>Registration Form</legend>

        <table>
          <tr>
            <td><label for="fname">First Name:</label></td>
            <td><input type="text" id="fname" name="fname" required /></td>
          </tr>

          <tr>
            <td><label for="lname">Last Name:</label></td>
            <td><input type="text" id="lname" name="lname" /></td>
          </tr>

          <tr>
            <td><label>Gender:</label></td>
            <td>
              <input type="radio" name="gender" value="male" required /> Male
              <input type="radio" name="gender" value="female" required />
              Female
            </td>
          </tr>

          <tr>
            <td><label for="email">Email:</label></td>
            <td><input type="email" id="email" name="email" required /></td>
          </tr>

          <tr>
            <td><label for="company">Company:</label></td>
            <td><input type="text" id="company" name="company" /></td>
          </tr>

          <tr>
            <td><label>Reason of Contact:</label></td>
            <td>
              <input type="radio" name="reason" value="Projects" required />
              Projects
              <input type="radio" name="reason" value="Thesis" /> Thesis
              <input type="radio" name="reason" value="Job" /> Job
            </td>
          </tr>

          <tr>
            <td><label>Topics:</label></td>
            <td>
              <input type="checkbox" name="topic" value="Web Development" /> Web
              Development
              <input type="checkbox" name="topic" value="Mobile Development" />
              Mobile Development
              <input type="checkbox" name="topic" value="AI/ML Development" />
              AI/ML Development
            </td>
          </tr>

          <tr>
            <td><label for="date">Consultation Date:</label></td>
            <td><input type="date" id="date" name="date" required /></td>
          </tr>

          <tr>
            <td></td>
            <td>
              <input type="submit" value="Submit" />
              <input type="reset" value="Reset" />
            </td>
          </tr>
        </table>
      </fieldset>
    </form>
